  confirmDelete('Key entfernen',`SSH-Key (${k.comment||k.type}) von ${name} entfernen?`,async()=>{
    try{await post('/security/users/ssh-keys/remove',{name,key:k.key});toast('Key entfernt');renderSshKeys(name);}
    catch(e){toast('Error: '+e.message,'error');}
  });
};

window.pkgAction=async(name,action)=>{
  const out=$('#pkg-out'); if(out){out.style.display='block';out.textContent=(action==='install'?'Installiere ':'Entferne ')+name+' …';}
  try{const r=await post('/sysmgr/packages/'+action,{name});
    if(!r||!r.job_id){toast('Start fehlgeschlagen','error');return;}
    pollPkgJob(r.job_id);
  }catch(e){toast('Error: '+e.message,'error');}
};
function pollPkgJob(id){
  const out=$('#pkg-out');
  const tick=async()=>{
    let j;try{j=await api('/sysmgr/job?id='+encodeURIComponent(id));}catch(e){return;}
    if(j.status==='running'){if(out)out.textContent='apt is running … (may take a few minutes)';setTimeout(tick,2500);return;}
    if(j.status==='succeeded'){const res=j.result||{};if(out)out.textContent=(res.stdout||'')+(res.stderr?('\n'+res.stderr):'')||'(fertig)';toast(res.ok===false?'Mit Fehlern beendet':'Fertig',res.ok===false?'error':'success');}
    else{if(out)out.textContent='Error: '+(j.error||'unbekannt');toast('Fehlgeschlagen','error');}
  };
  tick();
}

async function renderMaintenance(body){

  if(!kd.available){
    html+=`<div class="empty-state" style="padding:10px"><span class="mono">kdump-tools</span> not installed</div>`;
  }else{
    const reserved=kd.crash_size>0;
    html+=`
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
        <span class="status-pill ${kd.active?'run':'stop'}" style="font-size:11px">Service: ${kd.active?'active':'inactive'}</span>
        <span class="status-pill ${kd.enabled?'run':'stop'}" style="font-size:11px">Autostart: ${kd.enabled?'an':'aus'}</span>

      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn sm ghost" onclick="kdumpAct('${kd.active?'stop':'start'}')">${kd.active?'Stoppen':'Start'}</button>

      </div>`;
  }
  html+=`</div></div>`;

  // sosreport
  html+=`<div><div class="sec-hdr"><h3>Diagnostic report (sosreport)</h3>${sos.available?'<button class="btn" onclick="sosRun()">＋ Create report</button>':''}</div><div class="nx-card-inner">`;

    html+=`<div class="empty-state" style="padding:10px"><span class="mono">sos</span> not installed</div>`;

    html+=`<pre class="logbox" id="sos-out" style="display:none;max-height:200px;margin-bottom:12px"></pre>
      <table style="table-layout:fixed;width:100%"><thead><tr><th>Report</th><th style="width:90px">Size</th><th style="width:110px">Erstellt</th><th style="width:50px;text-align:right"></th></tr></thead><tbody>

  html+='</div>';

window.updatesInstall=async()=>{
  const reboot=$('#upd-reboot')?.checked;
  const btn=$('#upd-go'); if(btn){btn.disabled=true;btn.textContent='Installiere…';}
  const out=$('#upd-out'); if(out){out.style.display='block';out.textContent='Starte apt-get upgrade …';}
  try{
    const r=await post('/sysmgr/updates/apply',{});
    if(!r||!r.job_id){toast('Start fehlgeschlagen','error');if(btn){btn.disabled=false;btn.textContent='⬇ Install updates';}return;}
    pollUpdateJob(r.job_id,reboot);
  }catch(e){toast('Error: '+e.message,'error');if(btn){btn.disabled=false;btn.textContent='⬇ Install updates';}}
};
function pollUpdateJob(id,reboot){
  const out=$('#upd-out');
  const tick=async()=>{
    let j;
    try{j=await api('/sysmgr/updates/job?id='+encodeURIComponent(id));}
    catch(e){if(out)out.textContent+='\n[Statusabfrage fehlgeschlagen]';return;}
    if(j.status==='running'){if(out)out.textContent='apt-get upgrade is running … (may take a few minutes)';setTimeout(tick,2500);return;}
    const btn=$('#upd-go');
    if(j.status==='succeeded'){
      const res=j.result||{};
      if(out)out.textContent=(res.stdout||'')+(res.stderr?('\n'+res.stderr):'')||'(no output)';
      toast(res.ok===false?'Mit Fehlern beendet':'Updates installed',res.ok===false?'error':'success');
      if(btn){btn.disabled=false;btn.textContent='✓ Fertig';}
      if(reboot){toast('Reboot starting…');post('/sysmgr/power',{action:'reboot',delay:0});}
    } else {
      if(out)out.textContent='Error: '+(j.error||'unbekannt');
      toast('Update fehlgeschlagen','error');
      if(btn){btn.disabled=false;btn.textContent='⬇ Install updates';}
    }
  };
  tick();
}

window.runvardUpdateInstall=async()=>{
  const btn=$('#runvard-upd-go');
  const out=$('#runvard-upd-status');
  if(btn){btn.disabled=true;btn.textContent='Update running';btn.onclick=null;}
  if(out){
    out.style.display='grid';
    out.innerHTML=runvardUpdateInfoHtml('running','Update running','runvard is downloading and applying the latest release.');
  }
  try{
    const r=await post('/sysmgr/runvard-update/apply',{});
    if(!r||r.ok===false){
      throw new Error((r&&r.error)||'Update did not start');
    }
    toast('runvard update started');
    if(btn)btn.textContent='Update running';
    pollRunvardUpdateLog(Date.now()+180000);
  }catch(e){
    toast('runvard update failed: '+e.message,'error');
    if(out)out.textContent='Failed to start runvard update: '+e.message;
    if(btn){btn.disabled=false;btn.textContent='Refresh now';btn.onclick=runvardUpdateInstall;}
  }
};
function runvardUpdateInfoHtml(tone,title,detail){
  const cls=tone==='done'?'good':tone==='error'?'bad':'warn';
  return `<div class="nx-action-head" style="margin:0"><div><div class="nx-action-title">runvard update</div><div class="nx-action-sub" style="margin:4px 0 0">${esc(detail)}</div></div>${statusBadge(title,cls)}</div>`;
}
function summarizeRunvardUpdateLog(log){
  const lines=(log||'').split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
  const important=lines.filter(line=>/runvard update started|Downloading latest|Latest commit|Running installer|runvard update finished|failed|error/i.test(line));
  return important.slice(-6).join('\n');
}
function pollRunvardUpdateLog(until){
  const out=$('#runvard-upd-status');
  const btn=$('#runvard-upd-go');
  const tick=async()=>{
    try{
      const r=await api('/sysmgr/runvard-update/log');
      if(out&&r.log){
        const summary=summarizeRunvardUpdateLog(r.log);
        out.innerHTML=runvardUpdateInfoHtml('running','Update running',summary||'runvard update is still running.');
      }
      if((r.log||'').includes('runvard update finished')){
        toast('runvard update completed');
        if(out)out.innerHTML=runvardUpdateInfoHtml('done','Done','Update completed. Click Refresh now when you are ready to reload.');
        if(btn){btn.disabled=false;btn.textContent='Refresh now';btn.onclick=()=>location.reload();}
        return;
      }
    }catch(e){
      if(out)out.innerHTML=runvardUpdateInfoHtml('running','Update running','runvard may be restarting. Waiting for the update result.');
    }
    if(Date.now()<until)setTimeout(tick,2500);
    else{
      if(out)out.innerHTML=runvardUpdateInfoHtml('done','Check manually','The update request finished polling. Reload when you want to check the new version.');
      if(btn){btn.disabled=false;btn.textContent='Refresh now';btn.onclick=()=>location.reload();}
    }
  };
  tick();
}

const WIDGET_META={
  cpu:{icon:'🖥',name:'CPU – Details'},
  ram:{icon:'🧠',name:'RAM – Details'},
  disk:{icon:'💿',name:'Disk – Details'},

};
let _histChart=null;
const histBlock=(id,title)=>`<div class="nx-card-inner" style="margin-bottom:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">${title}</span><span style="font-size:10px;color:var(--text3)">last hour</span></div><div style="height:140px;position:relative"><canvas id="${id}"></canvas></div></div>`;
async function loadHistoryChart(canvasId,keys,opts){
  opts=opts||{};
  let data;try{data=await api('/system/history?minutes='+(opts.minutes||60));}catch(e){return;}
  const pts=data.points||[];
  const cv=document.getElementById(canvasId);if(!cv)return;
  if(_histChart){try{_histChart.destroy();}catch(e){}_histChart=null;}
  const labels=pts.map(p=>{const d=new Date(p.t*1000);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');});
  _histChart=new Chart(cv,{type:'line',
    data:{labels,datasets:keys.map(k=>({label:k.label,data:pts.map(p=>opts.scale?opts.scale(p[k.field]):p[k.field]),borderColor:k.color,backgroundColor:k.color+'22',borderWidth:1.5,fill:keys.length===1,tension:.35,pointRadius:0}))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:keys.length>1,labels:{color:'rgba(240,240,255,.6)',boxWidth:10,font:{size:10}}}},
      scales:{x:{ticks:{color:'rgba(240,240,255,.3)',maxTicksLimit:6,font:{size:9}},grid:{display:false}},
        y:{beginAtZero:true,suggestedMax:opts.max,ticks:{color:'rgba(240,240,255,.3)',font:{size:9},callback:opts.ytick},grid:{color:'rgba(255,255,255,.05)'}}},
      animation:false}});
}
function destroyHistChart(){if(_histChart){try{_histChart.destroy();}catch(e){}_histChart=null;}}

function openWidgetDetail(type){
  resetSearch();

  $('#modal-title').innerHTML=`<span>${m.icon}</span> ${m.name}`;
  $('#modal-tabs').innerHTML='';
  $('#search-btn').style.display='none';
  $('#overlay').classList.add('open');
  const body=$('#modal-body');
  body.style.padding='';body.style.overflow='';body.style.display='';body.style.flexDirection='';

}

function appTint(cat){
  return ({Media:'#a78bfa','Network':'#22d3ee','Productivity':'#7a4aff',AI:'#f472b6',
    Monitoring:'#9ca3af',Download:'#2dd4bf',Home:'#fbbf24',Developer:'#60a5fa','Datenbank':'#fb923c'})[cat]||'#9d7aff';
}
function appHexA(hex,al){const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${al})`;}

function appCardHtml(a){
  const tint=appTint(a.category);
  let actions,pill='';
  if(!a.installed){
    actions=`<button class="app-install-btn" onclick="appInstallForm('${a.id}')">Install</button>`;
  } else {
    pill=a.update_available
      ? `<span class="app-status-pill upd" title="Update available">↑ Update</span>`
      : a.running
        ? `<span class="app-status-pill run" title="running"><span class="sd"></span>running</span>`
        : `<span class="app-status-pill paused" title="pausiert"><span class="sd"></span>pausiert</span>`;
    const primary=a.running
      ? `<button class="btn sm success" style="flex:1" onclick="appOpen('${a.id}',${a.port})">↗ Open</button>`
      : `<button class="btn sm" style="flex:1" onclick="appAct('${a.id}','start')">▶ Resume</button>`;
    actions=`<div style="display:flex;gap:6px">
      ${primary}
      <button class="btn icon" title="Aktionen" onclick="appMenu(event,'${a.id}','${esc(a.name)}',${a.running?1:0},${a.update_available?1:0})" style="width:30px;height:30px;font-size:15px">⋯</button>
    </div>`;
  }
  return `
    <div class="app-card">
      ${pill}
      <div class="app-card-head">
        <div class="app-icon-wrap" style="background:${appHexA(tint,.12)};border-color:${appHexA(tint,.25)}">
          <img src="${esc(a.icon)}" alt="${esc(a.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="app-icon-fallback" style="display:none;background:${appHexA(tint,.18)};color:${tint}">${esc(a.name[0])}</div>
        </div>
        <div class="app-card-info"${a.installed?' style="padding-right:62px"':''}>
          <div class="app-card-name">${esc(a.name)}</div>
          <div class="app-card-meta">:${a.port||'—'}</div>
        </div>
      </div>
      <div class="app-card-desc">${esc(a.desc)}</div>
      <div class="app-card-actions">${actions}</div>
    </div>`;
}

window.appInstallForm=async id=>{
  try{
    const a=await api('/apps/get?app_id='+encodeURIComponent(id));
    openForm('Installieren: '+a.name,'🧩',[
      {name:'content',label:'docker-compose.yml',type:'textarea',rows:14,value:a.compose,hint:'Ports, volumes and env variables can be adjusted. Data is stored in /opt/runvard/data/apps/'+a.id+'/'},
    ],async d=>{
      closeForm();
      // Inline-Indikator in Modal-Header
      const actions=ensureInstallIndicatorHost();
      if(!actions)return;
      const indicator=document.createElement('div');
      indicator.className='install-indicator';
      indicator.innerHTML=`
        <span class="install-dot"></span>
        <span class="install-label">${esc(a.name)}</span>
        <span class="install-bar-wrap"><span class="install-bar-fill" id="inst-bar-${esc(id)}"></span></span>
        <span class="install-pct" id="inst-step-${esc(id)}">…</span>`;
      actions.insertBefore(indicator,actions.firstChild);

      try{
        const r=await post('/apps/install',{app_id:id,content:d.content});
        if(!r.job_id){toast('Error','error');indicator.remove();return;}
        _activeInstalls++;updateAppsBadge();
        // Poll für Status
        let progress=5;
        const barEl=$('#inst-bar-'+id),stepEl=$('#inst-step-'+id),lblEl=indicator.querySelector('.install-label');
        const poller=setInterval(async()=>{
          try{
            const s=await api('/apps/install-status?job_id='+encodeURIComponent(r.job_id));
            if(stepEl)stepEl.textContent=s.step||'…';
            if(s.status==='pulling')progress=Math.min(progress+1,70);
            else if(s.status==='starting')progress=Math.min(progress+5,95);
            if(barEl)barEl.style.width=Math.round(progress)+'%';
            if(s.status==='done'||s.status==='error'){
              clearInterval(poller);
              _activeInstalls=Math.max(0,_activeInstalls-1);updateAppsBadge();
              if(barEl)barEl.style.width='100%';
              if(s.ok){
                indicator.classList.add('done');
                if(lblEl)lblEl.textContent=a.name+' ✓';
                toast(a.name+' installed ✓');
                dashAutoAdd(a.id,a.name,a.icon,a.port);
              } else {
                indicator.classList.add('error');
                if(lblEl)lblEl.textContent='Error';
                toast(s.step||'Error','error');
              }
              setTimeout(()=>{indicator.remove();},2500);
              renderApps($('#modal-body'));
            }
          }catch(e){}
        },2000);
      }catch(e){
        _activeInstalls=Math.max(0,_activeInstalls-1);updateAppsBadge();
        indicator.classList.add('error');
        indicator.querySelector('.install-label').textContent='Error';
        toast('Error: '+e.message,'error');
        setTimeout(()=>{indicator.remove();},3000);
      }
    });
  }catch(e){toast('Error: '+e.message,'error');}
};

function renderDashboard(){
  const grid=$('#dash-grid');
  const section=$('#dash-section');
  if(!grid||!section)return;
  section.style.display='block';
  if(!dashTiles.length){grid.innerHTML='';return;}
  const host=location.hostname;
  grid.innerHTML=dashTiles.map(t=>{
    const isApp=t.type==='app';
    const statusCls=isApp?(t.running?'run':'stop'):'ext';
    const port=t.port||0;
    const url=isApp?`${host}:${port}`:(t.url||'').replace(/^https?:\/\//,'');
    const iconHtml=t.icon&&t.icon.length<=2?t.icon:`<img src="${esc(t.icon||'')}" onerror="this.parentElement.textContent='${esc((t.name||'?')[0])}'">`;
    return `<div class="dash-tile" data-id="${esc(t.id)}" onclick="dashClick(event,'${esc(t.id)}')" oncontextmenu="dashCtx(event,'${esc(t.id)}')">
      <div class="dash-tile-body${t.show_url?' has-url':''}">
        <div class="dash-dots" onclick="event.stopPropagation();dashCtx(event,'${esc(t.id)}')">•••</div>
        <div class="dash-status ${statusCls}"></div>
        <div class="dash-tile-icon">${iconHtml}</div>
        <div class="dash-tile-name">${esc(t.name)}</div>
      </div>
      ${t.show_url?`<div class="dash-tile-footer"><div class="dash-tile-url">${esc(url)}</div></div>`:''}
    </div>`;
  }).join('');
  // Drag & Drop
  if(typeof Sortable!=='undefined'){
    Sortable.create(grid,{animation:150,ghostClass:'sortable-ghost',chosenClass:'sortable-chosen',
      onEnd:()=>{
        const order=[...grid.querySelectorAll('.dash-tile')].map(el=>el.dataset.id);
        post('/dashboard/order',{order:JSON.stringify(order)});
      }
    });
  }
}

function applyBg(value, save=true){
  const b=document.body;
  // Alte Animationsklassen entfernen
  b.classList.remove('runvard-bg','aurora-bg','sunset-bg','ocean-bg','forest-bg','flame-bg','ice-bg','galaxy-bg');
  b.style.animation='';
  b.style.backgroundAttachment='fixed';
  if(value.startsWith('anim:')){
    const cls=value.slice(5);
    b.className=b.className+' '+cls;
  } else if(value.startsWith('gradient:')){
    b.style.backgroundImage='none';
    b.style.background=value.slice(9);
    b.style.backgroundAttachment='fixed';
  } else if(value.startsWith('color:')){
    b.style.backgroundImage='none';
    b.style.background=value.slice(6);
  } else if(value.startsWith('image:')){
    b.style.background='#0a0b14';
    b.style.backgroundImage='url('+value.slice(6)+')';
    b.style.backgroundSize='cover';
    b.style.backgroundPosition='center';
    b.style.backgroundRepeat='no-repeat';
    b.style.backgroundAttachment='fixed';
  }
  if(save){try{localStorage.setItem(BG_KEY,value);}catch(e){}}
  updatePresetActive(value);
}

function updatePresetActive(value){

function initBgDrop(){
  const area=document.querySelector('.bg-upload-area');
  if(!area||area._dropInit)return;
  area._dropInit=true;
  area.addEventListener('dragover',e=>{e.preventDefault();area.style.borderColor='var(--accent)';});
  area.addEventListener('dragleave',()=>{area.style.borderColor='';});
  area.addEventListener('drop',e=>{
    e.preventDefault();area.style.borderColor='';
    const file=e.dataTransfer.files[0];
    if(file&&file.type.startsWith('image/')){const r=new FileReader();r.onload=ev=>{applyBg('image:'+ev.target.result);closePanel();toast('Background set');};r.readAsDataURL(file);}

// Beginner-first render overrides.
function deviceTitle(d){return `${d.protected?'🔒 ':''}${esc(d.name)}`;}
function devicePath(name){return name.startsWith('/dev/')?name:'/dev/'+name;}
function partitionName(name,num=1){const base=name.startsWith('/dev/')?name.slice(5):name;return base+(/\d$/.test(base)?'p':'')+num;}
function defaultMountPoint(name){const base=(name.startsWith('/dev/')?name.slice(5):name).replace(/[^A-Za-z0-9_.-]/g,'-');return '/mnt/'+base;}
function normalizeMountPoint(value,name){const v=(value||'').trim();if(!v)return defaultMountPoint(name);return v.startsWith('/')?v:'/mnt/'+v.replace(/^\/+/,'');}
function requireOk(res,fallback){if(res&&res.ok===false)throw new Error(res.stderr||fallback||'Storage operation failed');return res;}
function cardMetric(label,value){return `<div><span>${esc(uiText(label))}</span><strong>${value}</strong></div>`;}
function simpleTable(headers,rows){
  return `<table class="nx-muted-table"><thead><tr>${headers.map(h=>`<th>${esc(uiText(h))}</th>`).join('')}</tr></thead><tbody>${rows||'<tr><td colspan="'+headers.length+'">'+emptyState('Nothing here yet')+'</td></tr>'}</tbody></table>`;
}
function primaryVolume(d){return (d.children||[]).find(x=>x.mountpoint)||(d.children||[]).find(x=>x.fstype)||(d.children||[])[0]||d;}
function renderDeviceCards(devs){
  return `<div class="nx-card-grid">${(devs||[]).map(d=>{
    const volume=primaryVolume(d);
    const hasVolumes=!!(d.children&&d.children.length);
    const used=d.children&&d.children.length?`${d.children.length} volume${d.children.length===1?'':'s'}`:'No volumes yet';
    const status=d.protected?statusBadge('System disk','warn'):volume.mountpoint?statusBadge('Mounted','good'):hasVolumes?statusBadge('Volume','warn'):statusBadge('Available','good');
    return `<div class="nx-action-card">
      <div class="nx-action-head"><div class="nx-action-title">${deviceTitle(d)}</div>${status}</div>
      <div class="nx-action-sub">${esc(d.model||d.type||'Disk')} · ${fmtBytes(d.size)} · ${used}</div>
      <div class="nx-kv">
        ${cardMetric('Filesystem',esc(volume.fstype||'None'))}
        ${cardMetric('Mounted at',esc(volume.mountpoint||'Not mounted'))}
      </div>
      <div class="nx-action-row">
        ${!d.protected&&d.type==='disk'&&!hasVolumes?`<button class="btn sm" onclick="diskWizard('${esc(d.name)}')">Set up disk</button>`:''}
        ${!d.protected&&/^(ext[234]|xfs|btrfs)$/.test(volume.fstype||'')?`<button class="btn ghost sm" onclick="fsGrowForm('${esc(volume.name)}','${esc(volume.mountpoint||'')}','${esc(volume.fstype)}')">Grow filesystem</button>`:''}
      </div>
      ${d.children&&d.children.length?advancedDetails('Volumes',renderDeviceCards(d.children),false):''}
    </div>`;
  }).join('')||emptyState('No disks detected')}</div>`;
}
async function renderStorage(body,tab){
  if(tab==='Disks'||!tab){
    const [d,mounts]=await Promise.all([api('/storage/devices'),api('/system/disks').catch(()=>[])]);
    const mounted=(mounts||[]).filter(x=>x.total);
    const root=mounted.find(x=>x.mountpoint==='/')||mounted[0];
    body.innerHTML=viewIntro('Storage overview','Set up new disks from here. The system disk is locked so beginners do not accidentally erase runvard.',`<button class="btn" onclick="renderStorage($('#modal-body'),'SMART')">Check health</button>`)
      +`<div class="nx-summary-grid">
        ${summaryCard('Disks',(d.devices||[]).length,'Physical devices found')}
        ${summaryCard('Mounted volumes',mounted.length,'Usable filesystems')}
        ${summaryCard('System disk',root?root.percent+'% used':'Unknown',root?`${fmtBytes(root.used)} / ${fmtBytes(root.total)}`:'No mount data')}
      </div>${renderDeviceCards(d.devices)}`;
    return;
  }
  if(tab==='RAID'){
    const d=await api('/storage/raid');
    body.innerHTML=viewIntro('Protection groups','RAID combines multiple disks for speed or protection. Use Mirror for the easiest safe setup.',`<button class="btn" onclick="raidForm()">Create RAID</button>`)
      +`<div class="nx-card-grid">${(d.arrays||[]).map(a=>`<div class="nx-action-card"><div class="nx-action-head"><div class="nx-action-title">${esc(a.name)}</div>${statusBadge('Active','good')}</div><div class="nx-action-sub">This array is available to the system.</div>${advancedDetails('Technical details',`<pre class="logbox">${esc(a.detail)}</pre>`,false)}</div>`).join('')||emptyState('No RAID groups configured')}</div>`;
    return;
  }
  if(tab==='SMART'){
    const d=await api('/storage/devices');
    const disks=(d.devices||[]).filter(x=>x.type==='disk');
    body.innerHTML=viewIntro('Disk health','SMART helps spot failing drives early. Some virtual or USB disks may not report health data.','')
      +`<div class="nx-card-grid" id="smart-cards">${disks.map(x=>`<div class="nx-action-card"><div class="nx-action-head"><div class="nx-action-title">${esc(x.name)}</div>${statusBadge('Checking','warn')}</div><div class="nx-action-sub">${fmtBytes(x.size)} · ${esc(x.model||'Disk')}</div></div>`).join('')||emptyState('No disks found')}</div>`;
    Promise.all(disks.map(async x=>({disk:x,smart:await api('/storage/smart?device='+encodeURIComponent(x.name)).catch(e=>({available:false,error:e.message}))}))).then(rows=>{
      const el=$('#smart-cards');if(!el)return;
      el.innerHTML=rows.map(({disk,smart})=>`<div class="nx-action-card">
        <div class="nx-action-head"><div class="nx-action-title">${esc(disk.name)}</div>${smart.available?statusBadge(smart.healthy?'Healthy':'Attention',smart.healthy?'good':'bad'):statusBadge('Unavailable','warn')}</div>
        <div class="nx-kv">
          ${cardMetric('Temperature',smart.temperature?smart.temperature+'°C':'Unknown')}
          ${cardMetric('Power-on hours',smart.power_on_hours?smart.power_on_hours+'h':'Unknown')}
          ${cardMetric('Size',fmtBytes(disk.size))}
          ${cardMetric('Model',esc(smart.model||disk.model||'Disk'))}
        </div>
      </div>`).join('');
    });
    return;
  }
  if(tab==='Swap')return renderSwapSimple(body);
  if(tab==='LUKS')return renderLuksSimple(body);
  if(tab==='ZFS/Btrfs')return renderZfsBtrfsSimple(body);
  if(tab==='iSCSI')return renderIscsiSimple(body);
  if(tab==='LVM')return renderLvmSimple(body);
}
async function renderSwapSimple(body){
  const d=await api('/storage/swap');
  const total=(d.swaps||[]).reduce((s,x)=>s+(x.size_kb||0),0)*1024;
  body.innerHTML=viewIntro('Memory safety buffer','Swap gives the server breathing room when RAM is full. A 2 GB swapfile is a safe default for small systems.',`<button class="btn" onclick="swapForm()">Create swapfile</button>`)
    +`<div class="nx-summary-grid">${summaryCard('Active swap areas',(d.swaps||[]).length,'Configured now')}${summaryCard('Total swap',fmtBytes(total),'Extra memory buffer')}</div>
    <div class="nx-card-grid">${(d.swaps||[]).map(s=>{const used=s.size_kb?Math.round(s.used_kb/s.size_kb*100):0;return `<div class="nx-action-card"><div class="nx-action-head"><div class="nx-action-title">${esc(s.name)}</div>${statusBadge('Active','good')}</div>${usageBar(used)}<div class="nx-kv">${cardMetric('Size',fmtBytes(s.size_kb*1024))}${cardMetric('Used',used+'%')}</div><button class="btn ghost sm" onclick="swapOff('${esc(s.name)}')">Deactivate</button></div>`}).join('')||emptyState('No swap active')}</div>`;
}

window.appInstallForm=async id=>{
  try{
    const a=await api('/apps/get?app_id='+encodeURIComponent(id));
    $('#form-head').innerHTML=`<span>🧩</span> ${esc(uiText('Install'))}: ${esc(a.name)}`;
    $('#form-body').innerHTML=`
      <div class="nx-card-inner">
        <div class="nx-action-title">${esc(a.name)}</div>
        <p class="nx-action-sub">${esc(a.desc||'Install this app with the default settings.')}</p>
        <div class="nx-kv">${cardMetric('Port',a.port||'Automatic')}${cardMetric('Data folder','/opt/runvard/data/apps/'+esc(a.id))}</div>
      </div>
      ${advancedDetails('Advanced compose file',`<textarea id="app-compose-content" rows="14" style="font-family:'JetBrains Mono',monospace">${esc(a.compose||'')}</textarea><div class="hint">Only edit this if you understand Docker Compose.</div>`,false)}
      <div class="form-actions"><button class="btn ghost" onclick="closeForm()">${esc(tr('cancel'))}</button><button class="btn" id="app-install-go">${esc(uiText('Install'))}</button></div>`;
    $('#form-overlay').classList.add('open');
    translateRenderedText($('#form-body'));
    $('#app-install-go').onclick=async()=>{
      const content=$('#app-compose-content')?.value||a.compose||'';
      closeForm();
      toast('Installing '+a.name+'…');
      const host=ensureInstallIndicatorHost();
      const indicator=document.createElement('div');
      indicator.className='install-indicator';
      indicator.innerHTML=`<span class="install-dot"></span><span class="install-label">${esc(a.name)}</span><span class="install-bar-wrap"><span class="install-bar-fill" id="inst-bar-${esc(id)}"></span></span><span class="install-pct" id="inst-step-${esc(id)}">…</span>`;
      if(host)host.insertBefore(indicator,host.firstChild);
      try{
        const r=await post('/apps/install',{app_id:id,content});
        if(!r.job_id){indicator.remove();toast('Install did not start','error');return;}
        _activeInstalls++;updateAppsBadge();
        let progress=8;
        const poller=setInterval(async()=>{
          try{
            const s=await api('/apps/install-status?job_id='+encodeURIComponent(r.job_id));
            const stepEl=$('#inst-step-'+id),barEl=$('#inst-bar-'+id),labelEl=indicator.querySelector('.install-label');
            if(stepEl)stepEl.textContent=s.step||'…';
            if(s.status==='pulling')progress=Math.min(progress+2,70);
            else if(s.status==='starting')progress=Math.min(progress+6,95);
            if(barEl)barEl.style.width=Math.round(progress)+'%';
            if(s.status==='done'||s.status==='error'){
              clearInterval(poller);_activeInstalls=Math.max(0,_activeInstalls-1);updateAppsBadge();
              if(barEl)barEl.style.width='100%';
              if(s.ok){indicator.classList.add('done');if(labelEl)labelEl.textContent=a.name+' ✓';toast(a.name+' installed');dashAutoAdd(a.id,a.name,a.icon,a.port);}
              else {indicator.classList.add('error');if(labelEl)labelEl.textContent='Install failed';toast(s.step||'Install failed','error');}
              setTimeout(()=>indicator.remove(),3000);
              renderApps($('#modal-body'));
            }
          }catch(e){}
        },2000);
      }catch(e){indicator.classList.add('error');toast('Error: '+e.message,'error');setTimeout(()=>indicator.remove(),3000);}
    };
  }catch(e){toast('Error: '+e.message,'error');}
};

function appCardHtml(a){
  const tint=appTint(a.category);
  let actions,pill='';
  if(!a.installed){
    actions=`<button class="app-install-btn" onclick="appInstallForm('${a.id}')">Install</button>`;
  } else {
    pill=a.update_available
      ? `<span class="app-status-pill upd" title="Update available">Update</span>`
      : a.running
        ? `<span class="app-status-pill run" title="Running"><span class="sd"></span>Running</span>`
        : `<span class="app-status-pill paused" title="Stopped"><span class="sd"></span>Stopped</span>`;
    const primary=a.running
      ? `<button class="btn sm success" style="flex:1" onclick="appOpen('${a.id}',${a.port})">Open</button>`
      : `<button class="btn sm" style="flex:1" onclick="appAct('${a.id}','start')">Start</button>`;
    actions=`<div style="display:flex;gap:6px">${primary}<button class="btn icon" title="Actions" onclick="appMenu(event,'${a.id}','${esc(a.name)}',${a.running?1:0},${a.update_available?1:0})" style="width:30px;height:30px;font-size:15px">⋯</button></div>`;
  }
  return `<div class="app-card">
    ${pill}
    <div class="app-card-head">
      <div class="app-icon-wrap" style="background:${appHexA(tint,.12)};border-color:${appHexA(tint,.25)}">
        <img src="${esc(a.icon)}" alt="${esc(a.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="app-icon-fallback" style="display:none;background:${appHexA(tint,.18)};color:${tint}">${esc(a.name[0])}</div>
      </div>
      <div class="app-card-info"${a.installed?' style="padding-right:62px"':''}>
        <div class="app-card-name">${esc(a.name)}</div>
        <div class="app-card-meta">:${a.port||'—'}</div>
      </div>
    </div>
    <div class="app-card-desc">${esc(a.desc)}</div>
    <div class="app-card-actions">${actions}</div>
  </div>`;
}

      +simpleTable(['Time','User','Action','Status','Remote'],(a.events||[]).map(x=>`<tr><td>${new Date(x.time*1000).toLocaleString(localeCode())}</td><td>${esc(x.user)}</td><td class="mono">${esc(x.action)}</td><td>${statusBadge(x.ok?'OK':'Failed',x.ok?'good':'bad')}</td><td class="mono">${esc(x.remote||'-')}</td></tr>`).join(''));
    return;
  }
  const alerts=await api('/monitoring/alerts/history');
  body.innerHTML=viewIntro('Alerts','Important events that need attention.','')+`<div class="nx-card-grid">${alerts.map(x=>`<div class="nx-action-card"><div class="nx-action-head"><div class="nx-action-title">${new Date(x.time*1000).toLocaleString(localeCode())}</div>${statusBadge(x.resolved?'Resolved':'Attention',x.resolved?'good':'bad')}</div><div class="nx-action-sub">${esc(x.message)}</div><span class="nx-chip">${esc(x.channel)}</span></div>`).join('')||emptyState('No alerts')}</div>`;
}

async function renderNetwork(body,tab){
  const sub=(tab==='Firewall')?'Firewall':'Interfaces';
  const tabs=`<div class="modal-tabs sub-tabs">${['Interfaces','Firewall'].map(t=>`<div class="modal-tab${t===sub?' active':''}" onclick="renderNetwork($('#modal-body'),'${t}')">${t}</div>`).join('')}</div>`;
  if(sub==='Firewall'){
    const f=await api('/network/firewall/rules');
    body.innerHTML=tabs+viewIntro('Firewall','Allow or block network access. Keep rules simple unless you know exactly what a service needs.',`<button class="btn" onclick="fwAddForm()">Add rule</button>`)
      +`<div class="nx-summary-grid">${summaryCard('Firewall',f.active?'Active':'Inactive',f.backend||'Unknown backend')}${summaryCard('Rules',(f.rules||[]).length,'Configured')}</div>`
      +simpleTable(['No.','To','Action','From',''],(f.rules||[]).map(r=>`<tr><td>${r.num}</td><td class="mono">${esc(r.to)}</td><td>${statusBadge(esc(r.action),/ALLOW/i.test(r.action)?'good':'bad')}</td><td>${esc(r.from)}</td><td><button class="btn danger sm" onclick="fwDelete(${r.num})">Delete</button></td></tr>`).join(''));
    return;
  }
  const ifs=await api('/network/interfaces');

    +`<div class="nx-card-grid">${ifs.map(i=>`<div class="nx-action-card"><div class="nx-action-head"><div class="nx-action-title">${esc(i.name)}</div>${statusBadge(i.up?'Connected':'Down',i.up?'good':'bad')}</div><div class="nx-kv">${cardMetric('IP',esc(i.ipv4||'No IP'))}${cardMetric('Speed',i.speed?i.speed+' Mbit':'Unknown')}${cardMetric('MAC',esc(i.mac||'-'))}${cardMetric('Type',i.is_bond?'Bond':'Interface')}</div><button class="btn ghost sm" onclick="ipConfigForm('${esc(i.name)}','${i.ipv4||''}')">Configure IP</button></div>`).join('')}</div>`;
}
window.fwDelete=num=>typedConfirm('Delete firewall rule',`Firewall rule ${num} will be removed.`,String(num),async()=>{try{await post('/network/firewall/remove',{num});toast('Rule removed');renderNetwork($('#modal-body'),'Firewall');}catch(e){toast('Error: '+e.message,'error');}});

async function renderSystem(body,tab){
  if(tab==='Info'||tab==='Overview'||!tab){
    const [i,u,alerts]=await Promise.all([api('/system/info'),api('/sysmgr/updates').catch(()=>({updates:0})),api('/monitoring/alerts/history').catch(()=>[])]);
    const activeAlerts=(alerts||[]).filter(x=>!x.resolved).length;
    body.innerHTML=viewIntro('System overview','This is the safe place to check health before changing settings.','')
      +`<div class="nx-summary-grid">${summaryCard('Server',esc(i.hostname),esc(i.os))}${summaryCard('Updates',u.updates||0,(u.updates||0)?'Attention needed':'System current')}${summaryCard('Alerts',activeAlerts,activeAlerts?'Review monitoring':'No active alerts')}${summaryCard('Uptime',fmtUptime(i.uptime_seconds),'Running time')}</div>
      <div class="nx-card-grid"><div class="nx-action-card"><div class="nx-action-title">Hardware</div><div class="nx-kv">${cardMetric('CPU',esc(i.cpu_model))}${cardMetric('Kernel',esc(i.kernel))}${cardMetric('Architecture',esc(i.arch))}${cardMetric('OS',esc(i.os))}</div></div></div>`;
    return;
  }
  if(tab==='Network'||tab==='Network')return renderNetwork(body,'Interfaces');
  if(tab==='Benutzer'||tab==='Users')return renderSecurity(body,'Benutzer');
  if(tab==='Services')return renderServicesSimple(body);
  if(tab==='Shares'||tab==='Shares')return renderSharesAll(body);
  if(tab==='Wartung'||tab==='Maintenance')return renderMaintenance(body);
  if(tab==='Advanced'){
    body.innerHTML=viewIntro('Advanced system tools','These tools can change low-level server behavior. Use them only when needed.','')
      +`<div class="nx-card-grid actions-grid">
        <div class="nx-action-card"><div class="nx-action-title">Packages</div><p class="nx-action-sub">Search, install or remove apt packages.</p><div class="nx-action-row"><button class="btn sm" onclick="renderSystem($('#modal-body'),'Pakete')">Open packages</button></div></div>
        <div class="nx-action-card"><div class="nx-action-title">AppArmor</div><p class="nx-action-sub">Inspect or change application security profiles.</p><div class="nx-action-row"><button class="btn sm" onclick="renderSystem($('#modal-body'),'AppArmor')">Open AppArmor</button></div></div>
        <div class="nx-action-card"><div class="nx-action-title">Cron</div><p class="nx-action-sub">Create scheduled command jobs.</p><div class="nx-action-row"><button class="btn sm" onclick="renderSystem($('#modal-body'),'Cron')">Open Cron</button></div></div>
      </div>`;
    return;
  }
  if(tab==='Cron'){
    const c=await api('/sysmgr/cron');
    body.innerHTML=viewIntro('Cron jobs','Run commands automatically on a schedule. Use this only for commands you already trust.',`<button class="btn" onclick="cronForm()">Create job</button>`)
      +simpleTable(['Schedule','Command'],c.map(x=>`<tr><td class="mono">${esc(x.schedule)}</td><td class="mono">${esc(x.command)}</td></tr>`).join(''));
    return;
  }
  if(['Pakete','AppArmor','Cron'].includes(tab)){
    const original={Pakete:renderPackages,AppArmor:renderAppArmor,Cron:null,Power:null}[tab];
    body.innerHTML=viewIntro('Advanced system tools','These tools can change low-level server behavior. Use them only when needed.','')+'<div id="advanced-system-body"></div>';
    const target=$('#advanced-system-body');
    if(original)return original(target);
  }
  return renderSystemOriginalFallback(body,tab);
}

        <div class="nx-action-card">

            ${cardMetric('Installed',esc(runvard.local_short||'Unknown'))}

            ${cardMetric('Branch',esc(runvard.branch||'main'))}
            ${cardMetric('Latest commit date',esc(remote.date||'Unknown'))}

function renderDashboard(){

  section.style.display='block';
  if(!dashTiles.length){grid.innerHTML=`<div class="nx-view-intro" style="grid-column:1/-1"><div><h3>Ready for apps</h3><p>Install apps or add custom shortcuts.</p></div><button class="btn" onclick="openTileById('apps')">Open apps</button></div>`;return;}
  const host=location.hostname;
  grid.innerHTML=dashTiles.map(t=>{
    const isApp=t.type==='app';const statusCls=isApp?(t.running?'run':'stop'):'ext';const port=t.port||0;const url=isApp?`${host}:${port}`:(t.url||'').replace(/^https?:\/\//,'');const iconHtml=t.icon&&t.icon.length<=2?t.icon:`<img src="${esc(t.icon||'')}" onerror="this.parentElement.textContent='${esc((t.name||'?')[0])}'">`;
    return `<div class="dash-tile" data-id="${esc(t.id)}" onclick="dashClick(event,'${esc(t.id)}')" oncontextmenu="dashCtx(event,'${esc(t.id)}')"><div class="dash-tile-body${t.show_url?' has-url':''}"><div class="dash-dots" onclick="event.stopPropagation();dashCtx(event,'${esc(t.id)}')">•••</div><div class="dash-status ${statusCls}"></div><div class="dash-tile-icon">${iconHtml}</div><div class="dash-tile-name">${esc(t.name)}</div></div>${t.show_url?`<div class="dash-tile-footer"><div class="dash-tile-url">${esc(url)}</div></div>`:''}</div>`;
  }).join('');
  if(typeof Sortable!=='undefined'){Sortable.create(grid,{animation:150,ghostClass:'sortable-ghost',chosenClass:'sortable-chosen',onEnd:()=>{const order=[...grid.querySelectorAll('.dash-tile')].map(el=>el.dataset.id);post('/dashboard/order',{order:JSON.stringify(order)});}});}
}

function nxAddClear(inp){
  if(!inp||inp.dataset.nxClear)return;
  inp.dataset.nxClear='1';
  const wrap=document.createElement('span');
  wrap.className='nx-search-wrap';
  ['flexGrow','flexShrink','flexBasis','width','minWidth','maxWidth'].forEach(p=>{
    const v=inp.style[p];
    if(v){wrap.style[p]=v;inp.style[p]='';}
  });
  inp.parentNode.insertBefore(wrap,inp);
  wrap.appendChild(inp);
  inp.style.flex='1 1 auto';
  inp.style.width='100%';
  inp.style.minWidth='0';
  inp.classList.add('nx-has-clear');
  const btn=document.createElement('button');
  btn.type='button';
  btn.className='nx-clear-btn';
  btn.tabIndex=-1;
  btn.title='Clear search';
  btn.setAttribute('aria-label','Clear search');
  btn.textContent='✕';
  btn.addEventListener('mousedown',e=>e.preventDefault());
  btn.addEventListener('click',()=>{
    inp.value='';
    inp.dispatchEvent(new Event('input',{bubbles:true}));
    inp.focus();
    sync();
  });
  wrap.appendChild(btn);
  const sync=()=>wrap.classList.toggle('has-text',inp.value.length>0);
  inp.addEventListener('input',sync);
  sync();
}
function nxDecorateSearch(root){
  (root||document).querySelectorAll('input.nx-search:not([data-nx-clear])').forEach(nxAddClear);
}
(()=>{
  nxDecorateSearch(document);
  if(!window.MutationObserver)return;
  const SKIP='input,textarea,script,style,.xterm,.logbox,.mono';
  const queue=new Set();
  let scheduled=false;
  const flush=()=>{
    scheduled=false;
    const nodes=[...queue];queue.clear();
    nodes.forEach(n=>{
      if(!n.isConnected)return;
      if(n.nodeType===1){
        if(n.closest(SKIP))return;
        nxDecorateSearch(n);
        translateRenderedText(n);
      }else if(n.nodeType===3){
        if(n.parentElement&&n.parentElement.closest(SKIP))return;
        const raw=n.nodeValue,trimmed=raw.trim();
        if(!trimmed)return;
        const t=phrase(trimmed);
        if(t!==trimmed)n.nodeValue=raw.replace(trimmed,t);
      }
    });
  };
  new MutationObserver(records=>{
    for(const r of records)for(const n of r.addedNodes)queue.add(n);
    if(scheduled)return;scheduled=true;
    requestAnimationFrame(flush);
  }).observe(document.body,{childList:true,subtree:true});
})();
