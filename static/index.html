// Container-Statistik (Momentaufnahme, auto-refresh alle 3s)
let _dockerStatsTimer=null;
window.dockerStats=async(id,name)=>{
  if(_dockerStatsTimer){clearInterval(_dockerStatsTimer);_dockerStatsTimer=null;}
  const draw=s=>{
    const memPct=s.mem_percent||0, cpu=s.cpu_percent||0;
    const card=(label,value,sub,col)=>`<div class="nx-card-inner" style="margin:0"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">${label}</div><div style="font-size:22px;font-weight:600;color:${col||'var(--text)'}">${value}</div>${sub?`<div style="font-size:11px;color:var(--text3);margin-top:2px">${sub}</div>`:''}</div>`;
    return `<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:520px">
      ${card('CPU',cpu+' %','',cpu>80?'var(--red)':cpu>50?'var(--yellow)':'var(--green)')}
      ${card('RAM',memPct+' %',fmtBytes(s.mem_used)+(s.mem_limit?' / '+fmtBytes(s.mem_limit):''),memPct>85?'var(--red)':memPct>60?'var(--yellow)':'var(--accent-light)')}
      ${card('Netz ▼',fmtBytes(s.net_rx),'empfangen')}
      ${card('Netz ▲',fmtBytes(s.net_tx),'gesendet')}
    </div>`;
  };
  const render=html=>{$('#modal-body').innerHTML=`<div class="toolbar"><button class="btn ghost sm" onclick="dockerStatsBack()">← Zurück</button><span style="padding:6px;color:var(--text2)">${esc(name)}</span><span style="margin-left:auto;font-size:11px;color:var(--text3)">aktualisiert alle 3s</span></div>${html}`;};
  render('<div class="loading">Lädt…</div>');
  const load=async()=>{try{const s=await api('/docker/stats?container_id='+id);if($('#modal-body').querySelector('.toolbar'))render(draw(s));else{clearInterval(_dockerStatsTimer);_dockerStatsTimer=null;}}catch(e){render('<div class="empty-state">Statistik nicht verfügbar (läuft der Container?)</div>');clearInterval(_dockerStatsTimer);_dockerStatsTimer=null;}};
  await load();
  _dockerStatsTimer=setInterval(load,3000);
};
window.dockerStatsBack=()=>{if(_dockerStatsTimer){clearInterval(_dockerStatsTimer);_dockerStatsTimer=null;}renderDocker($('#modal-body'),'Container');};

// Container-Shell via PTY-WebSocket (/ws/docker-exec), nutzt xterm wie das Terminal-Modul
window.dockerExec=(id,name)=>{
  const body=$('#modal-body');
  body.style.display='flex';body.style.flexDirection='column';body.style.padding='0';body.style.overflow='hidden';
  body.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;padding:6px 10px;background:rgba(0,0,0,.3);border-bottom:.5px solid rgba(255,255,255,.06);flex-shrink:0">
      <button class="btn ghost sm" onclick="dockerExecBack()">← Zurück</button>
      <span style="font-size:12px;color:var(--text2)">Shell: ${esc(name)}</span>
    </div>
    <div id="dexec-term" style="flex:1;overflow:hidden"></div>`;
  const term=new Terminal({fontFamily:"'JetBrains Mono','Cascadia Code',monospace",fontSize:13,lineHeight:1.35,cursorBlink:true,cursorStyle:'bar',cursorWidth:2,copyOnSelect:true,scrollback:5000,allowProposedApi:true,theme:TERM_THEME});
  const fit=new FitAddon.FitAddon();term.loadAddon(fit);
  try{term.loadAddon(new WebLinksAddon.WebLinksAddon());}catch(e){}
  term.open($('#dexec-term'));
  let dwebgl=null;
  try{term.loadAddon(new Unicode11Addon.Unicode11Addon());term.unicode.activeVersion='11';}catch(e){}
  fit.fit();term.focus();
  term.attachCustomKeyEventHandler(e=>{
    if(e.type!=='keydown')return true;
    if(e.ctrlKey&&e.shiftKey&&(e.key==='C'||e.key==='c')){e.preventDefault();const s=term.getSelection();if(s)navigator.clipboard?.writeText(s).then(()=>toast('Kopiert ✓')).catch(()=>{});return false;}
    if(e.ctrlKey&&!e.shiftKey&&(e.key==='v'||e.key==='V'))return false;
    return true;
  });
  const proto=location.protocol==='https:'?'wss':'ws';
  const ws=new WebSocket(`${proto}://${location.host}/ws/docker-exec?id=${encodeURIComponent(id)}`);
  termWs=ws; // damit closeModal die Verbindung schließt
  window._termDispose=()=>{try{dwebgl&&dwebgl.dispose();}catch(_){}try{term.dispose();}catch(_){}window._termDispose=null;};
  ws.onopen=()=>{ws.send(JSON.stringify({type:'resize',rows:term.rows,cols:term.cols}));term.focus();};
  ws.onmessage=e=>term.write(e.data);
  ws.onclose=()=>{try{term.write('\r\n\x1b[2m\x1b[33m── Verbindung getrennt ──\x1b[0m\r\n');}catch(_){}};
  term.onData(d=>{if(ws.readyState===1)ws.send(JSON.stringify({type:'input',data:d}));});
  new ResizeObserver(()=>{try{fit.fit();}catch(_){}if(ws.readyState===1)ws.send(JSON.stringify({type:'resize',rows:term.rows,cols:term.cols}));}).observe($('#dexec-term'));
};
window.dockerExecBack=()=>{
  if(termWs){try{termWs.close();}catch(e){}termWs=null;}
  if(typeof window._termDispose==='function'){try{window._termDispose();}catch(e){}}
  const b=$('#modal-body');b.style.display='';b.style.flexDirection='';b.style.padding='';b.style.overflow='';
  renderDocker(b,'Container');
};

// VM-Konsole via noVNC (RFB über /ws/vnc-Proxy)
let _vncRfb=null;
window.vmConsole=async name=>{
  const body=$('#modal-body');
  body.style.display='flex';body.style.flexDirection='column';body.style.padding='0';body.style.overflow='hidden';
  body.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;padding:6px 10px;background:rgba(0,0,0,.3);border-bottom:.5px solid rgba(255,255,255,.06);flex-shrink:0">
      <button class="btn ghost sm" onclick="vmConsoleBack()">← Zurück</button>
      <span style="font-size:12px;color:var(--text2)">Konsole: ${esc(name)}</span>
      <span id="vnc-status" style="margin-left:auto;font-size:11px;color:var(--text3)">verbinde…</span>
    </div>
    <div id="vnc-screen" style="flex:1;overflow:hidden;background:#000"></div>`;
  let RFB;
  try{const mod=await import('https://cdn.jsdelivr.net/npm/@novnc/novnc@1.5.0/+esm');RFB=mod.default;}
  catch(e){const st=$('#vnc-status');if(st)st.textContent='noVNC konnte nicht geladen werden';return;}
  const proto=location.protocol==='https:'?'wss':'ws';
  const url=`${proto}://${location.host}/ws/vnc?name=${encodeURIComponent(name)}`;
  try{
    _vncRfb=new RFB($('#vnc-screen'),url,{});
    _vncRfb.scaleViewport=true; _vncRfb.resizeSession=false;
    _vncRfb.addEventListener('connect',()=>{const st=$('#vnc-status');if(st)st.textContent='verbunden';});
    _vncRfb.addEventListener('disconnect',()=>{const st=$('#vnc-status');if(st)st.textContent='getrennt';});
    _vncRfb.addEventListener('securityfailure',()=>{const st=$('#vnc-status');if(st)st.textContent='Authentifizierung fehlgeschlagen';});
  }catch(e){const st=$('#vnc-status');if(st)st.textContent='Fehler: '+e.message;}
};
window.vmConsoleBack=()=>{
  if(_vncRfb){try{_vncRfb.disconnect();}catch(e){}_vncRfb=null;}
  const b=$('#modal-body');b.style.display='';b.style.flexDirection='';b.style.padding='';b.style.overflow='';
  renderVMs(b);
};

window.copyLink=id=>{
  const inp=$('#'+id);
  if(!inp)return;
  inp.select();
  try{
    navigator.clipboard.writeText(inp.value).then(()=>{
      toast('Link kopiert ✓');
    }).catch(()=>{
      document.execCommand('copy');
      toast('Link kopiert ✓');
    });
  }catch(e){
    document.execCommand('copy');
    toast('Link kopiert ✓');
  }
};

async function renderFirewall(body,tabBar){
  const f=await api('/network/firewall/rules');

    body.innerHTML=tabBar+`<div style="margin-bottom:10px;color:var(--text2)">Backend: <strong>${esc(f.backend)}</strong> – nur Anzeige, Verwaltung benötigt <span class="mono">ufw</span></div><pre class="logbox">${esc(f.raw||'')}</pre>`;
    return;
  }
  const statusPill=`<span class="status-pill ${f.active?'run':'stop'}" style="margin-left:8px">${f.active?'aktiv':'inaktiv'}</span>`;
  body.innerHTML=tabBar+`
   <div class="sec-hdr"><h3>Firewall (ufw)${statusPill}</h3><button class="btn" onclick="fwAddForm()">+ Regel</button></div>
   ${!f.active?`<div style="margin-bottom:12px;padding:10px 14px;background:rgba(234,179,8,.08);border:.5px solid rgba(234,179,8,.3);border-radius:10px;font-size:12px;color:var(--yellow)">⚠ ufw ist inaktiv – Regeln greifen erst nach Aktivierung der Firewall.</div>`:''}

   ${f.rules.map(r=>`<tr>
     <td style="color:var(--text3);font-family:'JetBrains Mono',monospace">${r.num}</td>
     <td style="font-family:'JetBrains Mono',monospace;font-size:12px;overflow:hidden;text-overflow:ellipsis">${esc(r.to)}</td>
     <td><span class="status-pill ${/ALLOW/i.test(r.action)?'run':'stop'}" style="font-size:10px">${esc(r.action)}</span></td>
     <td style="color:var(--text2);font-size:12px;overflow:hidden;text-overflow:ellipsis">${esc(r.from)}</td>
     <td style="text-align:right"><button class="btn icon danger" title="Regel löschen" onclick="fwDelete(${r.num})" style="width:26px;height:26px;font-size:12px">✕</button></td>
   </tr>`).join('')||'<tr><td colspan="5"><div class="empty-state">Keine Regeln</div></td></tr>'}
   </tbody></table>`;
}

window.pkgSearch=async()=>{
  const q=$('#pkg-q').value.trim(); if(!q){toast('Suchbegriff eingeben','error');return;}
  const r=$('#pkg-results'); r.innerHTML='<div class="loading">Suche…</div>';
  try{const d=await api('/sysmgr/packages/search?q='+encodeURIComponent(q));
    r.innerHTML=`<table style="table-layout:fixed;width:100%"><thead><tr><th style="width:180px">Paket</th><th>Beschreibung</th><th style="width:160px;text-align:right">Aktion</th></tr></thead><tbody>
    ${(d.packages||[]).map(p=>`<tr>
      <td style="font-weight:500;font-family:'JetBrains Mono',monospace;font-size:12px;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}</td>
      <td style="color:var(--text2);font-size:12px;overflow:hidden;text-overflow:ellipsis">${esc(p.desc)}</td>
      <td style="text-align:right"><div style="display:inline-flex;gap:4px">
        <button class="btn sm" onclick="pkgAction('${esc(p.name)}','install')">Installieren</button>
        <button class="btn ghost sm" onclick="pkgAction('${esc(p.name)}','remove')">Entfernen</button>
      </div></td></tr>`).join('')||'<tr><td colspan="3"><div class="empty-state">Nichts gefunden</div></td></tr>'}</tbody></table>`;
  }catch(e){r.innerHTML='<div class="empty-state">Fehler: '+esc(e.message)+'</div>';}
};
window.pkgAction=async(name,action)=>{
  const out=$('#pkg-out'); if(out){out.style.display='block';out.textContent=(action==='install'?'Installiere ':'Entferne ')+name+' …';}
  try{const r=await post('/sysmgr/packages/'+action,{name});
    if(!r||!r.job_id){toast('Start fehlgeschlagen','error');return;}
    pollPkgJob(r.job_id);
  }catch(e){toast('Fehler: '+e.message,'error');}
};
function pollPkgJob(id){
  const out=$('#pkg-out');
  const tick=async()=>{
    let j;try{j=await api('/sysmgr/job?id='+encodeURIComponent(id));}catch(e){return;}
    if(j.status==='running'){if(out)out.textContent='apt läuft … (kann einige Minuten dauern)';setTimeout(tick,2500);return;}
    if(j.status==='succeeded'){const res=j.result||{};if(out)out.textContent=(res.stdout||'')+(res.stderr?('\n'+res.stderr):'')||'(fertig)';toast(res.ok===false?'Mit Fehlern beendet':'Fertig',res.ok===false?'error':'success');}
    else{if(out)out.textContent='Fehler: '+(j.error||'unbekannt');toast('Fehlgeschlagen','error');}
  };
  tick();
}

window.uuSave=async()=>{const d={enable:$('#uu-enable').checked?'true':'false',auto_reboot:$('#uu-reboot').checked?'true':'false',reboot_time:$('#uu-time').value};try{const r=await post('/sysmgr/unattended/set',d);if(r&&r.ok===false){toast(r.stderr||'Fehler','error');return;}toast('Gespeichert');renderSystem($('#modal-body'),'Wartung');}catch(e){toast('Fehler: '+e.message,'error');}};
window.tunedSet=async()=>{const profile=$('#tuned-sel').value;toast('Wende Profil an…');try{const r=await post('/sysmgr/tuned/set',{profile});if(r&&r.ok===false){toast(r.stderr||'Fehler','error');return;}toast('Profil aktiv: '+profile);renderSystem($('#modal-body'),'Wartung');}catch(e){toast('Fehler: '+e.message,'error');}};
window.kdumpAct=async action=>{try{const r=await post('/sysmgr/kdump/action',{action});if(r&&r.ok===false){toast((r.stderr||'Fehler').slice(0,200),'error');return;}toast('OK');renderSystem($('#modal-body'),'Wartung');}catch(e){toast('Fehler: '+e.message,'error');}};
window.sosRun=async()=>{const out=$('#sos-out');if(out){out.style.display='block';out.textContent='Starte sosreport …';}toast('Diagnosebericht wird erstellt…');try{const r=await post('/sysmgr/sosreport/run',{});if(!r||!r.job_id){toast('Start fehlgeschlagen','error');return;}sosPoll(r.job_id);}catch(e){toast('Fehler: '+e.message,'error');}};
function sosPoll(id){
  const out=$('#sos-out');
  const tick=async()=>{
    let j;try{j=await api('/sysmgr/job?id='+encodeURIComponent(id));}catch(e){return;}
    if(j.status==='running'){if(out)out.textContent='sosreport läuft … (sammelt Diagnosedaten, kann mehrere Minuten dauern)';setTimeout(tick,3000);return;}
    if(j.status==='succeeded'){const res=j.result||{};if(out)out.textContent=res.output||'(fertig)';toast(res.ok===false?'Mit Fehlern beendet':'Bericht erstellt',res.ok===false?'error':'success');renderSystem($('#modal-body'),'Wartung');}
    else{if(out)out.textContent='Fehler: '+(j.error||'unbekannt');toast('Fehlgeschlagen','error');}
  };
  tick();
}

// Updates installieren (Hintergrund-Job + Polling)
window.updatesInstall=async()=>{
  const reboot=$('#upd-reboot')?.checked;
  const btn=$('#upd-go'); if(btn){btn.disabled=true;btn.textContent='Installiere…';}
  const out=$('#upd-out'); if(out){out.style.display='block';out.textContent='Starte apt-get upgrade …';}
  try{
    const r=await post('/sysmgr/updates/apply',{});
    if(!r||!r.job_id){toast('Start fehlgeschlagen','error');if(btn){btn.disabled=false;btn.textContent='⬇ Updates installieren';}return;}
    pollUpdateJob(r.job_id,reboot);
  }catch(e){toast('Fehler: '+e.message,'error');if(btn){btn.disabled=false;btn.textContent='⬇ Updates installieren';}}
};
function pollUpdateJob(id,reboot){
  const out=$('#upd-out');
  const tick=async()=>{
    let j;
    try{j=await api('/sysmgr/updates/job?id='+encodeURIComponent(id));}
    catch(e){if(out)out.textContent+='\n[Statusabfrage fehlgeschlagen]';return;}
    if(j.status==='running'){if(out)out.textContent='apt-get upgrade läuft … (kann einige Minuten dauern)';setTimeout(tick,2500);return;}
    const btn=$('#upd-go');
    if(j.status==='succeeded'){
      const res=j.result||{};
      if(out)out.textContent=(res.stdout||'')+(res.stderr?('\n'+res.stderr):'')||'(keine Ausgabe)';
      toast(res.ok===false?'Mit Fehlern beendet':'Updates installiert',res.ok===false?'error':'success');
      if(btn){btn.disabled=false;btn.textContent='✓ Fertig';}
      if(reboot){toast('Neustart wird eingeleitet…');post('/sysmgr/power',{action:'reboot',delay:0});}
    } else {
      if(out)out.textContent='Fehler: '+(j.error||'unbekannt');
      toast('Update fehlgeschlagen','error');
      if(btn){btn.disabled=false;btn.textContent='⬇ Updates installieren';}
    }
  };
  tick();
}

// ═══ Widget-Detail-Modals ═══
const WIDGET_META={
  cpu:{icon:'🖥',name:'CPU – Details'},
  ram:{icon:'🧠',name:'RAM – Details'},
  disk:{icon:'💿',name:'Disk – Details'},
  network:{icon:'🌐',name:'Netzwerk – Details'},
};
let _histChart=null;
const histBlock=(id,title)=>`<div class="nx-card-inner" style="margin-bottom:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">${title}</span><span style="font-size:10px;color:var(--text3)">letzte Stunde</span></div><div style="height:140px;position:relative"><canvas id="${id}"></canvas></div></div>`;
async function loadHistoryChart(canvasId,keys,opts){
  opts=opts||{};
  let data;try{data=await api('/system/history?minutes='+(opts.minutes||60));}catch(e){return;}
  const pts=data.points||[];
  const cv=document.getElementById(canvasId);if(!cv)return;
  if(_histChart){try{_histChart.destroy();}catch(e){}_histChart=null;}
  const labels=pts.map(p=>{const d=new Date(p.t*1000);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');});
  _histChart=new Chart(cv,{type:'line',
    data:{labels,datasets:keys.map(k=>({label:k.label,data:pts.map(p=>opts.scale?opts.scale(p[k.field]):p[k.field]),borderColor:k.color,backgroundColor:k.color+'22',borderWidth:1.5,fill:keys.length===1,tension:.35,pointRadius:0}))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:keys.length>1,labels:{color:'rgba(240,240,255,.6)',boxWidth:10,font:{size:10}}}},
      scales:{x:{ticks:{color:'rgba(240,240,255,.3)',maxTicksLimit:6,font:{size:9}},grid:{display:false}},
        y:{beginAtZero:true,suggestedMax:opts.max,ticks:{color:'rgba(240,240,255,.3)',font:{size:9},callback:opts.ytick},grid:{color:'rgba(255,255,255,.05)'}}},
      animation:false}});
}
function destroyHistChart(){if(_histChart){try{_histChart.destroy();}catch(e){}_histChart=null;}}

function openWidgetDetail(type){
  resetSearch();
  destroyHistChart();
  const m=WIDGET_META[type];
  $('#modal-title').innerHTML=`<span>${m.icon}</span> ${m.name}`;
  $('#modal-tabs').innerHTML='';
  $('#search-btn').style.display='none';
  $('#overlay').classList.add('open');
  const body=$('#modal-body');
  body.style.padding='';body.style.overflow='';body.style.display='';body.style.flexDirection='';
  body.innerHTML='<div class="loading">Lädt…</div>';
  if(type==='cpu') renderCpuDetail(body);
  else if(type==='ram') renderRamDetail(body);
  else if(type==='disk') renderDiskDetail(body);
  else if(type==='network') renderNetDetail(body);
}

      </div>
      <div>
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Info</div>
        <table><tr><td>Gesamt</td><td style="font-family:'JetBrains Mono',monospace">${cpu.percent}%</td></tr>
        <tr><td>Frequenz</td><td style="font-family:'JetBrains Mono',monospace">${cpu.freq||'?'} MHz</td></tr>
        <tr><td>Kerne (logisch)</td><td style="font-family:'JetBrains Mono',monospace">${cpu.cores}</td></tr>

    ${procs.map(p=>`<tr><td style="font-family:'JetBrains Mono',monospace">${p.pid}</td><td>${esc(p.name)}</td><td>${esc(p.user)}</td><td style="font-family:'JetBrains Mono',monospace;color:${p.cpu>50?'var(--red)':p.cpu>20?'var(--yellow)':'var(--text)'}">${p.cpu}%</td><td style="font-family:'JetBrains Mono',monospace">${fmtBytes(p.ram)}</td></tr>`).join('')}

let appsCatalog=[], appsActiveCat='Alle', appsSearch='', _activeInstalls=0;

function updateAppsBadge(){
  const el=$('#badge-apps');
  if(!el)return;
  if(_activeInstalls>0){
    el.textContent=_activeInstalls;
    el.className='tile-badge blue';
  } else {
    el.textContent='';
    el.className='tile-badge';
  }
}

async function renderApps(body){
  body.innerHTML='<div class="loading">Lädt App-Katalog…</div>';
  try{
    const data=await api('/apps/catalog');
    appsCatalog=data.apps;
    renderAppsView(body,data.categories);
  }catch(e){
    body.innerHTML=`<div class="empty-state">Fehler beim Laden: ${esc(e.message)}</div>`;
  }
}

function renderAppsView(body,categories){
  const q=appsSearch.toLowerCase();
  const filtered=appsCatalog.filter(a=>{
    const catOk=appsActiveCat==='Alle'||a.category===appsActiveCat;
    const qOk=!q||a.name.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q);
    return catOk&&qOk;
  });
  const installedCount=appsCatalog.filter(a=>a.installed).length;
  const updateCount=appsCatalog.filter(a=>a.update_available).length;

  body.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <input id="apps-search" class="nx-search" placeholder="Search apps…" value="${esc(appsSearch)}" style="flex:1;min-width:160px;max-width:280px" oninput="appsDoSearch(this.value)">
      <span style="font-size:11px;color:var(--text3)">${appsCatalog.length} apps · ${installedCount} installed${updateCount?` · <span style="color:#fbbf24">${updateCount} update${updateCount>1?'s':''}</span>`:''}</span>
      <button class="btn ghost sm" style="margin-left:auto" onclick="appsCheckUpdates()" title="Check for updates">↻ Check updates</button>
    </div>
    <div class="apps-cats" id="apps-cats">
      ${categories.map(c=>`<div class="apps-cat${c===appsActiveCat?' active':''}" onclick="appsSetCat('${esc(c)}')">${esc(c)}</div>`).join('')}
    </div>
    <div class="apps-grid" id="apps-grid">
      ${filtered.length?filtered.map(appCardHtml).join(''):'<div class="empty-state" style="grid-column:1/-1">No apps found</div>'}
    </div>`;
}

function appTint(cat){
  return ({Media:'#a78bfa','Netzwerk':'#22d3ee','Produktivität':'#7a4aff',AI:'#f472b6',
    Monitoring:'#9ca3af',Download:'#2dd4bf',Home:'#fbbf24',Developer:'#60a5fa','Datenbank':'#fb923c'})[cat]||'#9d7aff';
}
function appHexA(hex,al){const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${al})`;}

function appCardHtml(a){
  const tint=appTint(a.category);
  let actions,pill='';
  if(!a.installed){
    actions=`<button class="app-install-btn" onclick="appInstallForm('${a.id}')">Installieren</button>`;
  } else {
    pill=a.update_available
      ? `<span class="app-status-pill upd" title="Update verfügbar">↑ Update</span>`
      : a.running
        ? `<span class="app-status-pill run" title="läuft"><span class="sd"></span>läuft</span>`
        : `<span class="app-status-pill paused" title="pausiert"><span class="sd"></span>pausiert</span>`;
    const primary=a.running
      ? `<button class="btn sm success" style="flex:1" onclick="appOpen('${a.id}',${a.port})">↗ Öffnen</button>`
      : `<button class="btn sm" style="flex:1" onclick="appAct('${a.id}','start')">▶ Fortsetzen</button>`;
    actions=`<div style="display:flex;gap:6px">
      ${primary}
      <button class="btn icon" title="Aktionen" onclick="appMenu(event,'${a.id}','${esc(a.name)}',${a.running?1:0},${a.update_available?1:0})" style="width:30px;height:30px;font-size:15px">⋯</button>
    </div>`;
  }
  return `
    <div class="app-card">
      ${pill}
      <div class="app-card-head">
        <div class="app-icon-wrap" style="background:${appHexA(tint,.12)};border-color:${appHexA(tint,.25)}">
          <img src="${esc(a.icon)}" alt="${esc(a.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="app-icon-fallback" style="display:none;background:${appHexA(tint,.18)};color:${tint}">${esc(a.name[0])}</div>
        </div>
        <div class="app-card-info"${a.installed?' style="padding-right:62px"':''}>
          <div class="app-card-name">${esc(a.name)}</div>
          <div class="app-card-meta">:${a.port||'—'}</div>
        </div>
      </div>
      <div class="app-card-desc">${esc(a.desc)}</div>
      <div class="app-card-actions">${actions}</div>
    </div>`;
}

window.appsSetCat=cat=>{appsActiveCat=cat;renderApps($('#modal-body'));};
window.appsDoSearch=v=>{appsSearch=v;const grid=$('#apps-grid');if(!grid)return;
  const q=v.toLowerCase();
  const filtered=appsCatalog.filter(a=>{
    const catOk=appsActiveCat==='Alle'||a.category===appsActiveCat;
    const qOk=!q||a.name.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q);
    return catOk&&qOk;
  });
  grid.innerHTML=filtered.length?filtered.map(appCardHtml).join(''):'<div class="empty-state" style="grid-column:1/-1">No apps found</div>';
};

window.appInstallForm=async id=>{
  try{
    const a=await api('/apps/get?app_id='+encodeURIComponent(id));
    openForm('Installieren: '+a.name,'🧩',[
      {name:'content',label:'docker-compose.yml',type:'textarea',rows:14,value:a.compose,hint:'Ports, Volumes und Env-Variablen können angepasst werden. Daten landen in /opt/actax/data/apps/'+a.id+'/'},
    ],async d=>{
      closeForm();
      // Inline-Indikator in Modal-Header
      const actions=$('#modal-head-actions');
      if(!actions)return;
      const indicator=document.createElement('div');
      indicator.className='install-indicator';
      indicator.innerHTML=`
        <span class="install-dot"></span>
        <span class="install-label">${esc(a.name)}</span>
        <span class="install-bar-wrap"><span class="install-bar-fill" id="inst-bar-${esc(id)}"></span></span>
        <span class="install-pct" id="inst-step-${esc(id)}">…</span>`;
      actions.insertBefore(indicator,actions.firstChild);

      try{
        const r=await post('/apps/install',{app_id:id,content:d.content});
        if(!r.job_id){toast('Fehler','error');indicator.remove();return;}
        _activeInstalls++;updateAppsBadge();
        // Poll für Status
        let progress=5;
        const barEl=$('#inst-bar-'+id),stepEl=$('#inst-step-'+id),lblEl=indicator.querySelector('.install-label');
        const poller=setInterval(async()=>{
          try{
            const s=await api('/apps/install-status?job_id='+encodeURIComponent(r.job_id));
            if(stepEl)stepEl.textContent=s.step||'…';
            if(s.status==='pulling')progress=Math.min(progress+1,70);
            else if(s.status==='starting')progress=Math.min(progress+5,95);
            if(barEl)barEl.style.width=Math.round(progress)+'%';
            if(s.status==='done'||s.status==='error'){
              clearInterval(poller);
              _activeInstalls=Math.max(0,_activeInstalls-1);updateAppsBadge();
              if(barEl)barEl.style.width='100%';
              if(s.ok){
                indicator.classList.add('done');
                if(lblEl)lblEl.textContent=a.name+' ✓';
                toast(a.name+' installiert ✓');
                dashAutoAdd(a.id,a.name,a.icon,a.port);
              } else {
                indicator.classList.add('error');
                if(lblEl)lblEl.textContent='Fehler';
                toast(s.step||'Fehler','error');
              }
              setTimeout(()=>{indicator.remove();},2500);
              renderApps($('#modal-body'));
            }
          }catch(e){}
        },2000);
      }catch(e){
        _activeInstalls=Math.max(0,_activeInstalls-1);updateAppsBadge();
        indicator.classList.add('error');
        indicator.querySelector('.install-label').textContent='Fehler';
        toast('Fehler: '+e.message,'error');
        setTimeout(()=>{indicator.remove();},3000);
      }
    });
  }catch(e){toast('Fehler: '+e.message,'error');}
};

window.appAct=async(id,action)=>{

window.closeAppMenu=()=>{const m=$('#app-menu');if(m)m.remove();};
window.appMenu=(ev,id,name,running,upd)=>{
  ev.stopPropagation();
  closeAppMenu();
  const items=[];
  if(running){
    items.push(['⏸','Stop',()=>appAct(id,'stop')]);
    items.push(['↻','Restart',()=>appAct(id,'restart')]);
  } else {
    items.push(['▶','Start',()=>appAct(id,'start')]);
  }
  if(upd)items.push(['↑','Update',()=>appAct(id,'update')]);
  items.push('sep');
  items.push(['🗑','Uninstall',()=>appUninstall(id,name),true]);
  const m=document.createElement('div');
  m.id='app-menu';m.className='app-menu';
  const r=ev.currentTarget.getBoundingClientRect();
  m.style.top=Math.min(r.bottom+4,window.innerHeight-220)+'px';
  m.style.left=Math.min(r.right-172,window.innerWidth-184)+'px';
  items.forEach(it=>{
    if(it==='sep'){const s=document.createElement('div');s.className='sep';m.appendChild(s);return;}
    const [icon,label,fn,danger]=it;
    const d=document.createElement('div');
    if(danger)d.className='danger';
    d.innerHTML=`<span style="width:16px;text-align:center">${icon}</span> ${esc(label)}`;
    d.onclick=()=>{closeAppMenu();fn();};
    m.appendChild(d);
  });
  document.body.appendChild(m);
  setTimeout(()=>document.addEventListener('click',closeAppMenu,{once:true}),10);
};

let dashTiles=[];
async function loadDashboard(){
  try{
    const d=await api('/dashboard');
    dashTiles=d.tiles||[];
    renderDashboard();
  }catch(e){}
}

function renderDashboard(){
  const grid=$('#dash-grid');
  const section=$('#dash-section');
  if(!grid||!section)return;
  section.style.display='block';
  if(!dashTiles.length){grid.innerHTML='';return;}
  const host=location.hostname;
  grid.innerHTML=dashTiles.map(t=>{
    const isApp=t.type==='app';
    const statusCls=isApp?(t.running?'run':'stop'):'ext';
    const port=t.port||0;
    const url=isApp?`${host}:${port}`:(t.url||'').replace(/^https?:\/\//,'');
    const iconHtml=t.icon&&t.icon.length<=2?t.icon:`<img src="${esc(t.icon||'')}" onerror="this.parentElement.textContent='${esc((t.name||'?')[0])}'">`;
    return `<div class="dash-tile" data-id="${esc(t.id)}" onclick="dashClick(event,'${esc(t.id)}')" oncontextmenu="dashCtx(event,'${esc(t.id)}')">
      <div class="dash-tile-body${t.show_url?' has-url':''}">
        <div class="dash-dots" onclick="event.stopPropagation();dashCtx(event,'${esc(t.id)}')">•••</div>
        <div class="dash-status ${statusCls}"></div>
        <div class="dash-tile-icon">${iconHtml}</div>
        <div class="dash-tile-name">${esc(t.name)}</div>
      </div>
      ${t.show_url?`<div class="dash-tile-footer"><div class="dash-tile-url">${esc(url)}</div></div>`:''}
    </div>`;
  }).join('');
  // Drag & Drop
  if(typeof Sortable!=='undefined'){
    Sortable.create(grid,{animation:150,ghostClass:'sortable-ghost',chosenClass:'sortable-chosen',
      onEnd:()=>{
        const order=[...grid.querySelectorAll('.dash-tile')].map(el=>el.dataset.id);
        post('/dashboard/order',{order:JSON.stringify(order)});
      }
    });
  }
}

window.dashClick=(e,id)=>{
  if(e.target.closest('.dash-dots'))return;
  const t=dashTiles.find(x=>x.id===id);
  if(!t)return;
  if(t.type==='custom'&&t.url){window.open(t.url,'_blank');return;}
  if(t.type==='app'&&t.port){window.open(`http://${location.hostname}:${t.port}`,'_blank');}
};

// Kontextmenü
window.dashCtx=(e,id)=>{
  e.preventDefault();e.stopPropagation();
  const t=dashTiles.find(x=>x.id===id);
  if(!t)return;
  const old=document.querySelector('.dash-ctx');
  if(old)old.remove();
  const isApp=t.type==='app';
  const menu=document.createElement('div');
  menu.className='dash-ctx';
  menu.style.top=Math.min(e.clientY,window.innerHeight-280)+'px';
  menu.style.left=Math.min(e.clientX,window.innerWidth-180)+'px';
  const urlLabel=t.show_url?'IP ausblenden':'IP anzeigen';
  menu.innerHTML=`
    <div class="dash-ctx-item" onclick="dashOpen('${esc(id)}')"><span>↗ Öffnen</span></div>
    ${isApp&&t.running?`
    <div class="dash-ctx-item" onclick="dashAppAction('${esc(id)}','restart')"><span>↻ Neustart</span></div>
    <div class="dash-ctx-item" onclick="dashAppAction('${esc(id)}','stop')"><span>⏸ Pausieren</span></div>`:''}
    ${isApp&&!t.running?`
    <div class="dash-ctx-item" onclick="dashAppAction('${esc(id)}','start')"><span>▶ Starten</span></div>`:''}
    <div class="dash-ctx-sep"></div>
    ${isApp?`
    <div class="dash-ctx-item" onclick="dashCompose('${esc(id)}')"><span>✎ Compose bearbeiten</span></div>
    <div class="dash-ctx-item" onclick="dashFiles('${esc(id)}')"><span>📂 Dateien anzeigen</span></div>`:`
    <div class="dash-ctx-item" onclick="dashEditCustom('${esc(id)}')"><span>✎ Bearbeiten</span></div>`}
    <div class="dash-ctx-sep"></div>
    <div class="dash-ctx-item" onclick="dashToggleUrl('${esc(id)}',${!t.show_url})">
      <span>${urlLabel}</span>
      <div class="dash-toggle${t.show_url?' on':''}"></div>
    </div>
    <div class="dash-ctx-sep"></div>
    <div class="dash-ctx-item danger" onclick="dashRemove('${esc(id)}','${esc(t.name)}')"><span>🗑 Entfernen</span></div>`;
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',()=>{menu.remove();},{once:true}),10);
};

window.dashOpen=id=>{
  const t=dashTiles.find(x=>x.id===id);

function applyBg(value, save=true){
  const b=document.body;
  // Alte Animationsklassen entfernen
  b.classList.remove('actax-bg','aurora-bg','sunset-bg','ocean-bg','forest-bg','flame-bg','ice-bg','galaxy-bg');
  b.style.animation='';
  b.style.backgroundAttachment='fixed';
  if(value.startsWith('anim:')){
    const cls=value.slice(5);
    b.className=b.className+' '+cls;
  } else if(value.startsWith('gradient:')){
    b.style.backgroundImage='none';
    b.style.background=value.slice(9);
    b.style.backgroundAttachment='fixed';
  } else if(value.startsWith('color:')){
    b.style.backgroundImage='none';
    b.style.background=value.slice(6);
  } else if(value.startsWith('image:')){
    b.style.background='#0a0b14';
    b.style.backgroundImage='url('+value.slice(6)+')';
    b.style.backgroundSize='cover';
    b.style.backgroundPosition='center';
    b.style.backgroundRepeat='no-repeat';
    b.style.backgroundAttachment='fixed';
  }
  if(save){try{localStorage.setItem(BG_KEY,value);}catch(e){}}
  updatePresetActive(value);
}

function applyColor(hex){applyBg('color:'+hex);toast('Hintergrund gesetzt');}
function applyUrl(url){if(!url.trim())return;applyBg('image:'+url.trim());closePanel();toast('Hintergrund gesetzt');}
function applyImageFile(inp){
  if(!inp.files[0])return;
  const r=new FileReader();
  r.onload=e=>{applyBg('image:'+e.target.result);closePanel();toast('Hintergrund gesetzt');};
  r.readAsDataURL(inp.files[0]);
}
function resetBg(){applyBg('anim:actax-bg');toast('Standard wiederhergestellt');}

function updatePresetActive(value){
  document.querySelectorAll('.bg-preset').forEach((el,i)=>{
    const match = value==='gradient:'+BG_PRESETS[i]?.grad;
    el.classList.toggle('active', match);
  });
}

function buildPresets(){
  const container=$('#bg-presets');
  if(!container)return;
  const saved=localStorage.getItem(BG_KEY)||'';
  container.innerHTML=BG_PRESETS.map((p,i)=>{
    const isActive=saved==='anim:'+p.anim;
    return `<div class="bg-preset${isActive?' active':''}" title="${p.label}" style="background:linear-gradient(${p.prev})" onclick="applyBg('anim:${p.anim}');toast('${p.label}')"><div class="check">✓</div><div style="font-size:9px;color:rgba(255,255,255,.6);position:absolute;bottom:4px;left:0;right:0;text-align:center">${p.label}</div></div>`;
  }).join('');
}

function initBgDrop(){
  const area=document.querySelector('.bg-upload-area');
  if(!area||area._dropInit)return;
  area._dropInit=true;
  area.addEventListener('dragover',e=>{e.preventDefault();area.style.borderColor='var(--accent)';});
  area.addEventListener('dragleave',()=>{area.style.borderColor='';});
  area.addEventListener('drop',e=>{
    e.preventDefault();area.style.borderColor='';
    const file=e.dataTransfer.files[0];
    if(file&&file.type.startsWith('image/')){const r=new FileReader();r.onload=ev=>{applyBg('image:'+ev.target.result);closePanel();toast('Hintergrund gesetzt');};r.readAsDataURL(file);}
  });
}

function toggleBgPanel(){
  const overlay=$('#bg-panel-overlay');
  const isOpen=overlay.classList.toggle('open');
  if(isOpen){buildPresets();setTimeout(initBgDrop,50);}
}
function closePanel(){$('#bg-panel-overlay').classList.remove('open');}
window.copyText=text=>{navigator.clipboard?.writeText(text).then(()=>toast('Kopiert')).catch(()=>{const i=document.createElement('input');i.value=text;document.body.appendChild(i);i.select();document.execCommand('copy');i.remove();toast('Kopiert');});};

function nxAddClear(inp){
  if(!inp||inp.dataset.nxClear)return;
  inp.dataset.nxClear='1';
  const wrap=document.createElement('span');
  wrap.className='nx-search-wrap';
  ['flexGrow','flexShrink','flexBasis','width','minWidth','maxWidth'].forEach(p=>{
    const v=inp.style[p];
    if(v){wrap.style[p]=v;inp.style[p]='';}
  });
  inp.parentNode.insertBefore(wrap,inp);
  wrap.appendChild(inp);
  inp.style.flex='1 1 auto';
  inp.style.width='100%';
  inp.style.minWidth='0';
  inp.classList.add('nx-has-clear');
  const btn=document.createElement('button');
  btn.type='button';
  btn.className='nx-clear-btn';
  btn.tabIndex=-1;
  btn.title='Suche löschen';
  btn.setAttribute('aria-label','Suche löschen');
  btn.textContent='✕';
  btn.addEventListener('mousedown',e=>e.preventDefault());
  btn.addEventListener('click',()=>{
    inp.value='';
    inp.dispatchEvent(new Event('input',{bubbles:true}));
    inp.focus();
    sync();
  });
  wrap.appendChild(btn);
  const sync=()=>wrap.classList.toggle('has-text',inp.value.length>0);
  inp.addEventListener('input',sync);
  sync();
}
function nxDecorateSearch(root){
  (root||document).querySelectorAll('input.nx-search:not([data-nx-clear])').forEach(nxAddClear);
}
(()=>{
  nxDecorateSearch(document);
  const mb=$('#modal-body');
  if(mb&&window.MutationObserver){
    let scheduled=false;
    new MutationObserver(()=>{
      if(scheduled)return;scheduled=true;
      requestAnimationFrame(()=>{scheduled=false;nxDecorateSearch(mb);});
    }).observe(mb,{childList:true,subtree:true});
  }
})();


(()=>{try{const s=localStorage.getItem(BG_KEY);if(s)applyBg(s,false);}catch(e){}})();
</script>
